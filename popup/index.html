<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NebulaTraceX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles/popup.css" />
</head>

<body>
    <div class="app" id="app">
        <header class="header">
            <div class="logo">
                <span class="logo-dot" id="logo-dot"></span>
                NebulaTraceX
            </div>
            <div class="row" style="gap: 6px">
                <button class="theme-btn" id="theme-toggle" title="Toggle dark mode">Dark</button>
            </div>
        </header>

        <!-- Tabs nav -->
        <nav class="tabs-bar">
            <button class="tab-btn active" data-tab="home" data-i18n="tabs.home">HOME</button>
            <button class="tab-btn" data-tab="sitemap">
                <span data-i18n="tabs.sitemap">SITE-MAP</span>
                <span class="tab-badge" id="badge-steps">0</span>
            </button>
            <button class="tab-btn" data-tab="stats" data-i18n="tabs.stats">STATS</button>
            <button class="tab-btn" data-tab="settings" data-i18n="tabs.settings">SETTINGS</button>
        </nav>

        <div class="tab-content">
  

            <div class="tab-panel active" id="tab-home">
                <div class="home-shell">
                    <div class="home-top">
                        <div class="home-icon">🔍</div>
                        <div class="home-icon">🔔</div>
                    </div>

                    <div class="home-card">
                        <div class="home-card-title">NebulaTraceX</div>
                        <div class="home-card-sub">Quick capture</div>
                    </div>

                    <div class="home-actions">
                        <button class="btn btn-primary btn-record" id="btn-start" data-i18n="recorder.start_btn">
                            Start Recording
                        </button>
                        <button class="btn btn-ghost btn-record btn-capture" id="btn-screenshot" data-i18n-attr="title"
                            data-i18n="recorder.screenshot_btn">
                            Capture
                        </button>
                    </div>

                    <div class="home-stats">
                        <div class="home-pill">2/4</div>
                        <div class="home-timer" id="elapsed-time" style="font-variant-numeric: tabular-nums">00:00</div>
                        <div class="home-pill">●</div>
                    </div>

                    <div class="status-bar idle home-status" id="status-bar">
                        <span><span class="status-dot"></span><span id="status-text" data-i18n="recorder.ready">Ready to record</span></span>
                    </div>

                    <div class="home-site-card">
                        <div class="home-site-title">Amazon</div>
                        <div class="session-info" id="session-url" data-i18n="recorder.session_prompt">
                            Choose a tab to start...
                        </div>
                    </div>

                    <div class="note-wrap">
                        <div class="section-label" data-i18n="recorder.note_label">Notes</div>
                        <textarea class="field" id="session-note" rows="4" data-i18n="recorder.note_placeholder"
                            data-i18n-attr="placeholder" placeholder="Describe bug or context... (auto-saved)"></textarea>
                    </div>

                    <div class="home-actions">
                        <button class="btn btn-ghost btn-sm" id="btn-view-site" data-i18n="recorder.view_site"
                            style="display:none">
                            View Site Details
                        </button>
                    </div>
                </div>
            </div>

            <div class="tab-panel" id="tab-sitemap">
                <div class="search-box">
                    <span style="color: var(--text-subtle); font-size: 13px">Search</span>
                    <input type="text" id="sitemap-search" data-i18n="sitemap.search_placeholder"
                        data-i18n-attr="placeholder" placeholder="Search site..." />
                </div>
                <div id="sitemap-list"></div>

                <div class="sitemap-detail" id="sitemap-detail" style="display:none">
                    <div class="row-between" style="margin-bottom:8px">
                        <button class="btn btn-ghost btn-sm" id="btn-back-sitemap"
                            data-i18n="sitemap.back">Back</button>
                        <span class="badge badge-gray" id="sitemap-hostname"></span>
                    </div>
                    <div class="card" style="margin-bottom:8px">
                        <div class="detail-title" id="sitemap-site-name">—</div>
                        <div class="detail-meta">
                            <span id="sitemap-session-count">0</span>
                            <span id="sitemap-step-count">0</span>
                        </div>
                        <select class="field" id="sitemap-session-select"></select>
                    </div>

                    <div class="toggle-group detail-tabs">
                        <button class="toggle-btn active" data-site-tab="steps"
                            data-i18n="details.tab_steps">Steps</button>
                        <button class="toggle-btn" data-site-tab="networks"
                            data-i18n="details.tab_networks">Networks</button>
                        <button class="toggle-btn" data-site-tab="images" data-i18n="details.tab_images">Images</button>
                    </div>

                    <div class="detail-panel active" id="site-steps"></div>
                    <div class="detail-panel" id="site-networks"></div>
                    <div class="detail-panel" id="site-images"></div>
                </div>
            </div>

            <div class="tab-panel" id="tab-stats">
                <div id="stats-skeleton">
                    <div class="chart-wrap">
                        <div class="chart-title" data-i18n="stats.skeleton_project">Allocated by Project</div>
                        <div class="skeleton" style="height: 120px"></div>
                    </div>
                    <div class="skeleton" style="height: 200px; border-radius: 8px"></div>
                </div>

                <div id="stats-content" style="display: none">
                    <div class="chart-wrap" style="display: flex; gap: 12px; align-items: center">
                        <canvas id="chart-pie" width="100" height="100" style="flex-shrink: 0"></canvas>
                        <div id="chart-legend" style="font-size: 11px; line-height: 1.8"></div>
                    </div>

                    <div style="overflow-x: auto">
                        <table class="stats-table" id="stats-table">
                            <thead>
                                <tr>
                                    <th data-col="displayName">
                                        <span data-i18n="stats.col_project">Project</span> <span
                                            class="sort-arrow"></span>
                                    </th>
                                    <th data-col="sessionCount">
                                        <span data-i18n="stats.col_sessions">Sessions</span> <span
                                            class="sort-arrow"></span>
                                    </th>
                                    <th data-col="stepCount">
                                        <span data-i18n="stats.col_steps">Steps</span> <span class="sort-arrow"></span>
                                    </th>
                                    <th data-col="errorCount">
                                        <span data-i18n="stats.col_errors">Errors</span> <span
                                            class="sort-arrow"></span>
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="stats-tbody"></tbody>
                        </table>
                    </div>

                    <div class="divider"></div>
                    <button class="btn btn-ghost btn-sm btn-full" id="btn-clear" style="color: var(--danger)"
                        data-i18n="stats.btn_clear">
                        Clear all data
                    </button>
                </div>
            </div>
            <div class="tab-panel" id="tab-settings">
                <div class="card">
                    <div class="section-label" data-i18n="settings.title">Settings</div>
                    <div style="font-size:12px;color:var(--text-muted);line-height:1.5">
                        <div data-i18n="settings.desc">This section will contain preferences and advanced options.</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="image-modal" id="image-modal" style="display:none">
            <div class="image-modal-backdrop" id="image-modal-backdrop"></div>
            <div class="image-modal-card">
                <div class="image-modal-toolbar">
                    <button class="btn btn-ghost btn-sm" id="image-modal-open" data-i18n="sitemap.open_window">Open
                        Window</button>
                    <div class="row" style="gap:6px">
                        <button class="btn btn-ghost btn-sm" id="image-modal-pen" data-i18n="sitemap.pen">Pen</button>
                        <button class="btn btn-ghost btn-sm" id="image-modal-clear"
                            data-i18n="sitemap.clear">Clear</button>
                        <button class="btn btn-primary btn-sm" id="image-modal-save"
                            data-i18n="sitemap.save">Save</button>
                    </div>
                </div>
                <div class="image-modal-stage">
                    <img id="image-modal-img" alt="screenshot" />
                    <canvas id="image-modal-canvas"></canvas>
                </div>
                <textarea class="field" id="image-modal-note" rows="2" data-i18n="sitemap.image_note"
                    data-i18n-attr="placeholder" placeholder="Add a note for this image..."></textarea>
                <div class="row-between" style="margin-top:6px">
                    <span id="image-modal-time" style="font-size:11px;color:var(--text-subtle)"></span>
                    <button class="btn btn-ghost btn-sm" id="image-modal-close" data-i18n="sitemap.close">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="popup.js" type="module"></script>
</body>

</html>
